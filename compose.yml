version: "v1.0.0"

services:
  apache-php:
    build: ./apache
    container_name: php-chat
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apache/www:/var/www/html

  node-server:
    build: ./node_server
    container_name: node-ws
    env_file:
      - .env
    depends_on:
      - redis
    working_dir: /usr/src/app
    volumes:
      - ./node_server/src:/usr/src/app/src
    ports:
      - "3000:3000"
    command: ["node", "src/index.js"]

  postgres:
    image: postgres:18.1
    container_name: chat-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql:Z
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

volumes:
  pgdata:
